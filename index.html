<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Capture The Flag Arena</title>

    <link rel="stylesheet" href="style.css">
</head>


<body>

    <div id="gameContainer">

        <canvas id="game"></canvas>


        <div id="ui">

            <h1>🏆 Capture The Flag</h1>

            <div id="score">
                <span class="blue">
                    🔵 Blue:
                    <span id="blueScore">0</span>
                </span>

                <span class="red">
                    🔴 Red:
                    <span id="redScore">0</span>
                </span>
            </div>


            <div id="status">
                Fight for the flag!
            </div>

        </div>



        <div id="help">

            <b>Controls</b><br>
            🟦 WASD — Move<br>
            🎯 Mouse — Aim<br>
            🔫 Click — Shoot<br>
            🚩 Capture enemy flag

        </div>


        <div id="crosshair"></div>


        <div id="message">
        </div>


    </div>



    <script src="game.js"></script>

</body>

</html>
