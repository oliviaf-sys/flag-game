<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Capture The Flag Arena</title>

<link rel="stylesheet" href="style.css">
</head>


<body>

<div id="gameWrapper">


    <canvas id="game" width="1200" height="700"></canvas>


    <div id="hud">

        <div class="team blue">
            🔵 BLUE
            <span id="blueScore">0</span>
        </div>


        <div id="title">
            CAPTURE THE FLAG
        </div>


        <div class="team red">
            🔴 RED
            <span id="redScore">0</span>
        </div>

    </div>



    <div id="controls">

        <b>CONTROLS</b><br>
        WASD — Move<br>
        Mouse — Aim<br>
        Click — Shoot

    </div>



    <div id="message"></div>


</div>



<script src="game.js"></script>

</body>
</html>
